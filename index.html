<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Warehouse Inventory</title>

<!-- Libreria scanner -->
<script defer src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

h1{
background:#222;
color:white;
padding:10px;
}

#reader{
width:300px;
margin:auto;
margin-top:10px;
}

button,input{
padding:10px;
margin:5px;
font-size:16px;
}

</style>

</head>

<body>

<h1>Warehouse Scanner</h1>

<input id="product" placeholder="Codice prodotto">

<br>

<button id="scanBtn">Avvia Scanner</button>

<div id="reader"></div>

<script>

let scanner;

/* Aspetta che la pagina sia caricata */
window.addEventListener("load", function(){

document.getElementById("scanBtn").addEventListener("click", startScanner);

});

async function startScanner(){

if(typeof Html5Qrcode === "undefined"){

alert("Errore: libreria scanner non caricata");

return;

}

try{

const cameras = await Html5Qrcode.getCameras();

if(!cameras.length){

alert("Nessuna fotocamera trovata");

return;

}

scanner = new Html5Qrcode("reader");

scanner.start(

cameras[0].id,

{
fps:10,
qrbox:200
},

(decodedText)=>{

document.getElementById("product").value = decodedText;

scanner.stop();

navigator.vibrate?.(100);

},

(err)=>{}

);

}

catch(e){

alert("Errore fotocamera: " + e);

}

}

</script>

</body>
</html>
