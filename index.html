<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Warehouse PRO</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

h1{
background:#222;
color:white;
padding:10px;
}

video{
width:320px;
border:3px solid #333;
margin-top:10px;
}

button,input,select{
padding:10px;
margin:5px;
font-size:16px;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
width:95%;
}

th,td{
border:1px solid #ccc;
padding:6px;
}

.low{
background:#ffe0b2;
}

.critical{
background:#ffb3b3;
}

</style>

</head>

<body>

<h1>📦 Warehouse PRO</h1>

<input id="user" placeholder="Operatore">

<br>

<select id="mode">
<option value="entrata">Entrata</option>
<option value="uscita">Uscita</option>
<option value="inventario">Inventario</option>
</select>

<br>

<button onclick="startScanner()">📷 Scansiona</button>

<button onclick="stopScanner()">⛔ Stop</button>

<br>

<video id="video"></video>

<br>

<input id="scaffold" placeholder="Scaffale">

<input id="product" placeholder="Codice prodotto">

<input id="name" placeholder="Nome prodotto">

<input id="qty" type="number" value="1">

<br>

<button onclick="saveMove()">💾 Registra Movimento</button>

<h2>Movimenti</h2>

<table id="table">

<tr>
<th>Data</th>
<th>Operatore</th>
<th>Codice</th>
<th>Nome</th>
<th>Scaffale</th>
<th>Qty</th>
<th>Tipo</th>
<th>Stock</th>
</tr>

</table>

<script>

let codeReader
let db

/* DATABASE */

let request = indexedDB.open("warehouseDB",1)

request.onupgradeneeded = e=>{

db = e.target.result

db.createObjectStore("prodotti",{keyPath:"codice"})
db.createObjectStore("movimenti",{keyPath:"id",autoIncrement:true})

}

request.onsuccess = e=>{

db = e.target.result
updateTable()

}

/* SCANNER */

async function startScanner(){

try{

codeReader = new ZXing.BrowserMultiFormatReader()

const devices = await codeReader.listVideoInputDevices()

if(!devices.length){

alert("Nessuna fotocamera trovata")
return

}

codeReader.decodeFromVideoDevice(

devices[0].deviceId,

'video',

(result,err)=>{

if(result){

document.getElementById("product").value = result.text

navigator.vibrate?.(100)

stopScanner()

}

}

)

}

catch(e){

alert("Errore fotocamera: " + e)

}

}

function stopScanner(){

if(codeReader){

codeReader.reset()

}

}

/* SALVA MOVIMENTO */

function saveMove(){

let codice = document.getElementById("product").value
let nome = document.getElementById("name").value
let qty = parseInt(document.getElementById("qty").value)
let scaffale = document.getElementById("scaffold").value
let tipo = document.getElementById("mode").value
let user = document.getElementById("user").value

if(!codice || !user){

alert("Inserisci operatore e codice")
return

}

let tx = db.transaction(["prodotti","movimenti"],"readwrite")

let store = tx.objectStore("prodotti")
let log = tx.objectStore("movimenti")

let req = store.get(codice)

req.onsuccess = ()=>{

let data = req.result || {codice:codice,stock:0,nome:nome}

data.nome = nome

if(tipo=="entrata") data.stock += qty
if(tipo=="uscita") data.stock = Math.max(0,data.stock-qty)
if(tipo=="inventario") data.stock = qty

store.put(data)

/* alert stock */

if(data.stock < 10){

alert("🚨 STOCK CRITICO")

}

else if(data.stock < 15){

alert("⚠️ STOCK BASSO")

}

log.add({

data:new Date().toLocaleString(),
user:user,
codice:codice,
nome:nome,
scaffale:scaffale,
qty:qty,
tipo:tipo,
stock:data.stock

})

updateTable()

}

}

/* TABELLA */

function updateTable(){

let tx = db.transaction("movimenti","readonly")
let store = tx.objectStore("movimenti")

store.getAll().onsuccess = e=>{

let table = document.getElementById("table")

table.innerHTML = `
<tr>
<th>Data</th>
<th>Operatore</th>
<th>Codice</th>
<th>Nome</th>
<th>Scaffale</th>
<th>Qty</th>
<th>Tipo</th>
<th>Stock</th>
</tr>
`

e.target.result.reverse().forEach(r=>{

let tr = table.insertRow()

if(r.stock < 10) tr.className="critical"
else if(r.stock < 15) tr.className="low"

tr.insertCell(0).innerText = r.data
tr.insertCell(1).innerText = r.user
tr.insertCell(2).innerText = r.codice
tr.insertCell(3).innerText = r.nome
tr.insertCell(4).innerText = r.scaffale
tr.insertCell(5).innerText = r.qty
tr.insertCell(6).innerText = r.tipo
tr.insertCell(7).innerText = r.stock

})

}

}

</script>

</body>
</html>
