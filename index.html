<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Warehouse Scanner PRO</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

h1{
background:#222;
color:white;
padding:10px;
}

video{
width:300px;
border:3px solid #444;
margin-top:10px;
}

button,input{
padding:10px;
margin:6px;
font-size:16px;
}

</style>

</head>

<body>

<h1>📦 Warehouse Scanner PRO</h1>

<input id="product" placeholder="Codice prodotto">

<br>

<button onclick="startScanner()">📷 Avvia Scanner</button>

<button onclick="stopScanner()">⛔ Stop</button>

<br>

<video id="video"></video>

<script>

let codeReader;
let selectedDeviceId;

async function startScanner(){

try{

codeReader = new ZXing.BrowserMultiFormatReader();

const devices = await codeReader.listVideoInputDevices();

if(!devices.length){

alert("Nessuna fotocamera trovata");

return;

}

selectedDeviceId = devices[0].deviceId;

codeReader.decodeFromVideoDevice(

selectedDeviceId,

'video',

(result, err)=>{

if(result){

document.getElementById("product").value = result.text;

navigator.vibrate?.(100);

stopScanner();

}

}

);

}
catch(e){

alert("Errore fotocamera: " + e);

}

}

function stopScanner(){

if(codeReader){

codeReader.reset();

}

}

</script>

</body>
</html>
