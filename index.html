<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Warehouse Inventory PRO</title>
<script src="https://unpkg.com/html5-qrcode@2.3.9/minified/html5-qrcode.min.js"></script>
<style>
body{font-family:Arial;text-align:center;background:#f4f4f4;}
h1{background:#222;color:white;padding:10px;}
#reader{width:300px;height:250px;margin:auto;}
button,input,select{padding:8px;margin:5px;font-size:16px;}
table{margin:auto;border-collapse:collapse;width:95%;margin-top:20px;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
.low{background:#ffe0b2;}
.critical{background:#ffb3b3;}
</style>
</head>
<body>

<h1>📦 Warehouse Inventory PRO</h1>

<input id="user" placeholder="Operatore"><br>
<select id="mode">
<option value="entrata">Entrata</option>
<option value="uscita">Uscita</option>
<option value="inventario">Inventario</option>
</select><br>

<button id="startBtn">📷 Avvia Scanner</button>
<button onclick="stopScanner()">⛔ Stop</button>

<div id="reader"></div><br>

<input id="scaffold" placeholder="Scaffale">
<input id="product" placeholder="Codice prodotto">
<input id="productName" placeholder="Nome prodotto">
<input id="qty" type="number" value="1"><br>

<button onclick="saveMove()">💾 Salva Movimento</button>

<h2>📊 Registro Movimenti</h2>
<table id="table">
<tr><th>Data</th><th>Operatore</th><th>Codice</th><th>Nome Prodotto</th><th>Scaffale</th><th>Qty</th><th>Tipo</th><th>Stock</th></tr>
</table>

<script>
let scanner;

// Scanner
document.getElementById("startBtn").addEventListener("click", ()=>{
  scanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 200 },
    false
  );
  scanner.render((decodedText)=>{
    document.getElementById("product").value = decodedText;

    // Se esiste il prodotto nel DB, mostra il nome
    let tx = db.transaction("prodotti","readonly");
    let store = tx.objectStore("prodotti");
    let req = store.get(decodedText);
    req.onsuccess = function(){
      if(req.result) document.getElementById("productName").value = req.result.name || "";
    }

    navigator.vibrate(100);
  });
});

function stopScanner(){
  if(scanner){ scanner.clear(); }
}

// IndexedDB
let db;
let request=indexedDB.open("warehouseDB",1);
request.onupgradeneeded=e=>{
  db=e.target.result;
  db.createObjectStore("prodotti",{keyPath:"codice"});
  db.createObjectStore("log",{keyPath:"id",autoIncrement:true});
};
request.onsuccess=e=>{ db=e.target.result; updateTable(); }

// Salva movimento
function saveMove(){
  let codice=document.getElementById("product").value.trim();
  let nome=document.getElementById("productName").value.trim();
  let qty=parseInt(document.getElementById("qty").value);
  let scaffale=document.getElementById("scaffold").value.trim();
  let mode=document.getElementById("mode").value;
  let user=document.getElementById("user").value;
  if(!codice || !user){alert("Inserisci codice e operatore"); return;}
  let timestamp=new Date().toLocaleString();
  let tx=db.transaction(["prodotti","log"],"readwrite");
  let store=tx.objectStore("prodotti");
  let log=tx.objectStore("log");
  let req=store.get(codice);
  req.onsuccess=function(){
    let data=req.result || {codice:codice,stock:0};
    data.scaffale=scaffale;
    data.name = nome; // salva il nome prodotto
    if(mode=="entrata") data.stock+=qty;
    else if(mode=="uscita") data.stock=Math.max(0,data.stock-qty);
    else if(mode=="inventario") data.stock=qty;
    store.put(data);

    // Alert stock
    if(data.stock<10){alert("🚨 STOCK CRITICO (<10)");}
    else if(data.stock<15){alert("⚠️ STOCK BASSO (<15)");}

    log.add({timestamp,user,codice,nome:data.name,scaffale,qty,tipo:mode,stock:data.stock});
    updateTable();
  }
}

// Aggiorna tabella
function updateTable(){
  let tx=db.transaction("log","readonly");
  let store=tx.objectStore("log");
  let table=document.getElementById("table");
  table.innerHTML=`<tr><th>Data</th><th>Operatore</th><th>Codice</th><th>Nome Prodotto</th><th>Scaffale</th><th>Qty</th><th>Tipo</th><th>Stock</th></tr>`;
  store.getAll().onsuccess=e=>{
    e.target.result.reverse().forEach(r=>{
      let tr=table.insertRow();
      if(r.stock<10) tr.className="critical";
      else if(r.stock<15) tr.className="low";
      tr.insertCell(0).innerText=r.timestamp;
      tr.insertCell(1).innerText=r.user;
      tr.insertCell(2).innerText=r.codice;
      tr.insertCell(3).innerText=r.nome || "";
      tr.insertCell(4).innerText=r.scaffale;
      tr.insertCell(5).innerText=r.qty;
      tr.insertCell(6).innerText=r.tipo;
      tr.insertCell(7).innerText=r.stock;
    });
  }
}
</script>
</body>
</html>
